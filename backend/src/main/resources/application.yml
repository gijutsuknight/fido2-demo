spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:fido2demo}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:fido2user}
    password: ${DB_PASSWORD:fido2pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always

app:
  jwt:
    secret: ${JWT_SECRET:fido2-demo-secret-key-change-in-production-at-least-256-bits}
    expiration: ${JWT_EXPIRATION:86400000}
  webauthn:
    rp-id: ${RP_ID:192.168.1.11}
    rp-name: ${RP_NAME:FIDO2 Demo}
    rp-origins: ${RP_ORIGINS:http://192.168.1.11:8080,http://192.168.1.11,http://localhost:5173,http://localhost:3000,http://localhost}
    challenge-timeout: ${CHALLENGE_TIMEOUT:300000}
    android-package: ${ANDROID_PACKAGE:com.fido2demo.mobile}
    android-cert-fingerprints: ${ANDROID_CERT_FINGERPRINTS:FA:C6:17:45:DC:09:03:78:6F:B9:ED:E6:2A:96:2B:39:9F:73:48:F0:BB:6F:89:9B:83:32:66:75:91:03:3B:9C}

logging:
  level:
    com.fido2demo: DEBUG
    com.yubico: INFO
